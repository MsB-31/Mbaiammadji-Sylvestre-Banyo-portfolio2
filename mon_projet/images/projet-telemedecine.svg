<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <title>Plateforme de télémédecine — React / Laravel</title>
  <desc>Interface de la plateforme web de télémédecine avec tableau de bord patient et médecin</desc>

  <!-- Fond général -->
  <rect width="680" height="420" fill="#0f172a" rx="10"/>

  <!-- Barre de navigation -->
  <rect x="0" y="0" width="680" height="48" fill="#1e293b" rx="10"/>
  <rect x="0" y="20" width="680" height="28" fill="#1e293b"/>
  <circle cx="28" cy="24" r="10" fill="#3b82f6"/>
  <text x="28" y="29" text-anchor="middle" fill="white" font-size="11" font-weight="700">M+</text>
  <text x="50" y="29" fill="white" font-size="13" font-weight="600">MedConnect</text>
  <rect x="390" y="12" width="80" height="24" rx="4" fill="#3b82f6"/>
  <text x="430" y="28" text-anchor="middle" fill="white" font-size="11">Connexion</text>
  <text x="170" y="29" fill="#94a3b8" font-size="11">Accueil</text>
  <text x="230" y="29" fill="#94a3b8" font-size="11">Médecins</text>
  <text x="300" y="29" fill="#94a3b8" font-size="11">Rendez-vous</text>

  <!-- Sidebar gauche -->
  <rect x="12" y="60" width="150" height="340" fill="#1e293b" rx="8"/>
  <text x="87" y="84" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="600">MENU</text>

  <!-- Items menu sidebar -->
  <rect x="20" y="92" width="134" height="30" rx="5" fill="#3b82f6"/>
  <text x="87" y="111" text-anchor="middle" fill="white" font-size="11">🏠 Tableau de bord</text>

  <text x="87" y="140" text-anchor="middle" fill="#94a3b8" font-size="11">📅 Rendez-vous</text>
  <text x="87" y="165" text-anchor="middle" fill="#94a3b8" font-size="11">💊 Ordonnances</text>
  <text x="87" y="190" text-anchor="middle" fill="#94a3b8" font-size="11">💬 Messagerie</text>
  <text x="87" y="215" text-anchor="middle" fill="#94a3b8" font-size="11">📋 Dossier médical</text>
  <text x="87" y="240" text-anchor="middle" fill="#94a3b8" font-size="11">📊 Résultats</text>

  <line x1="20" y1="260" x2="154" y2="260" stroke="#334155" stroke-width="0.5"/>

  <!-- Profil sidebar -->
  <circle cx="44" cy="292" r="16" fill="#1d4ed8"/>
  <text x="44" y="297" text-anchor="middle" fill="white" font-size="10" font-weight="700">SB</text>
  <text x="70" y="288" fill="white" font-size="11" font-weight="600">Sylvestre B.</text>
  <text x="70" y="302" fill="#94a3b8" font-size="10">Patient</text>

  <!-- Contenu principal -->
  <!-- Titre dashboard -->
  <text x="188" y="84" fill="white" font-size="14" font-weight="600">Tableau de bord</text>
  <text x="188" y="100" fill="#94a3b8" font-size="11">Bonjour Sylvestre — voici votre santé aujourd'hui</text>

  <!-- Cards stats (ligne 1) -->
  <!-- Card 1 -->
  <rect x="188" y="110" width="148" height="72" rx="7" fill="#1e293b"/>
  <text x="200" y="130" fill="#94a3b8" font-size="10">Prochain RDV</text>
  <text x="200" y="152" fill="white" font-size="16" font-weight="700">Demain</text>
  <text x="200" y="168" fill="#3b82f6" font-size="10">Dr. Kamga — 10h30</text>

  <!-- Card 2 -->
  <rect x="348" y="110" width="148" height="72" rx="7" fill="#1e293b"/>
  <text x="360" y="130" fill="#94a3b8" font-size="10">Ordonnances actives</text>
  <text x="360" y="152" fill="white" font-size="22" font-weight="700">3</text>
  <text x="360" y="168" fill="#22c55e" font-size="10">↗ 1 renouvelée ce mois</text>

  <!-- Card 3 -->
  <rect x="508" y="110" width="148" height="72" rx="7" fill="#1e293b"/>
  <text x="520" y="130" fill="#94a3b8" font-size="10">Consultations</text>
  <text x="520" y="152" fill="white" font-size="22" font-weight="700">12</text>
  <text x="520" y="168" fill="#94a3b8" font-size="10">cette année</text>

  <!-- Section RDV à venir -->
  <rect x="188" y="196" width="308" height="190" rx="7" fill="#1e293b"/>
  <text x="200" y="218" fill="white" font-size="12" font-weight="600">Rendez-vous à venir</text>

  <!-- RDV items -->
  <rect x="200" y="226" width="284" height="44" rx="5" fill="#0f172a"/>
  <circle cx="220" cy="248" r="12" fill="#1d4ed8"/>
  <text x="220" y="252" text-anchor="middle" fill="white" font-size="9" font-weight="700">KN</text>
  <text x="240" y="244" fill="white" font-size="11" font-weight="500">Dr. Kamga Narcisse</text>
  <text x="240" y="258" fill="#94a3b8" font-size="10">Cardiologie — Vidéo</text>
  <text x="462" y="244" text-anchor="end" fill="#3b82f6" font-size="10">Dem. 10:30</text>
  <rect x="432" y="255" width="48" height="16" rx="3" fill="#14532d"/>
  <text x="456" y="266" text-anchor="middle" fill="#22c55e" font-size="9">Confirmé</text>

  <rect x="200" y="276" width="284" height="44" rx="5" fill="#0f172a"/>
  <circle cx="220" cy="298" r="12" fill="#7c3aed"/>
  <text x="220" y="302" text-anchor="middle" fill="white" font-size="9" font-weight="700">FA</text>
  <text x="240" y="294" fill="white" font-size="11" font-weight="500">Dr. Fotso Alain</text>
  <text x="240" y="308" fill="#94a3b8" font-size="10">Généraliste — Présentiel</text>
  <text x="462" y="294" text-anchor="end" fill="#3b82f6" font-size="10">15 Juin 09:00</text>
  <rect x="428" y="305" width="56" height="16" rx="3" fill="#1e3a5f"/>
  <text x="456" y="316" text-anchor="middle" fill="#60a5fa" font-size="9">En attente</text>

  <rect x="200" y="326" width="284" height="44" rx="5" fill="#0f172a"/>
  <circle cx="220" cy="348" r="12" fill="#be185d"/>
  <text x="220" y="352" text-anchor="middle" fill="white" font-size="9" font-weight="700">MB</text>
  <text x="240" y="344" fill="white" font-size="11" font-weight="500">Dr. Manga Brice</text>
  <text x="240" y="358" fill="#94a3b8" font-size="10">Dermatologie — Vidéo</text>
  <text x="462" y="344" text-anchor="end" fill="#3b82f6" font-size="10">22 Juin 14:00</text>
  <rect x="432" y="355" width="48" height="16" rx="3" fill="#14532d"/>
  <text x="456" y="366" text-anchor="middle" fill="#22c55e" font-size="9">Confirmé</text>

  <!-- Panel vidéo consultation -->
  <rect x="508" y="196" width="148" height="190" rx="7" fill="#1e293b"/>
  <text x="582" y="218" text-anchor="middle" fill="white" font-size="11" font-weight="600">Consultation vidéo</text>
  <rect x="516" y="224" width="132" height="88" rx="5" fill="#0f172a"/>
  <circle cx="582" cy="256" r="22" fill="#1d4ed8" opacity="0.4"/>
  <text x="582" y="261" text-anchor="middle" fill="#60a5fa" font-size="18">📹</text>
  <text x="582" y="322" text-anchor="middle" fill="#94a3b8" font-size="10">Rejoindre dans 18min</text>

  <rect x="522" y="332" width="56" height="28" rx="5" fill="#dc2626"/>
  <text x="550" y="350" text-anchor="middle" fill="white" font-size="18">📞</text>
  <rect x="590" y="332" width="56" height="28" rx="5" fill="#16a34a"/>
  <text x="618" y="350" text-anchor="middle" fill="white" font-size="18">🎥</text>

  <text x="582" y="376" text-anchor="middle" fill="#94a3b8" font-size="9">React • Laravel • WebRTC</text>

</svg>
