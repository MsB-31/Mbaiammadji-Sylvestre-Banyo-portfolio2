<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <title>CamLog — Démon de journalisation centralisé en Rust</title>
  <desc>Illustration du projet CamLog : démon Rust recevant des logs TCP, stdin et fichiers, les structurant et les persistant sur disque et SQLite</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Fond sombre -->
  <rect width="680" height="420" fill="#0d1117" rx="10"/>

  <!-- Titre -->
  <text x="340" y="38" text-anchor="middle" fill="#E05D2A" font-size="18" font-weight="700" letter-spacing="2">CamLog</text>
  <text x="340" y="58" text-anchor="middle" fill="#8b949e" font-size="12">Centralized Logging Daemon — Rust GL4</text>

  <!-- Sources (gauche) -->
  <!-- TCP -->
  <rect x="30" y="90" width="130" height="44" rx="6" fill="#161b22" stroke="#E05D2A" stroke-width="1"/>
  <text x="95" y="108" text-anchor="middle" fill="#E05D2A" font-size="12" font-weight="700">TCP Network</text>
  <text x="95" y="124" text-anchor="middle" fill="#8b949e" font-size="10">:9000 listener</text>

  <!-- stdin -->
  <rect x="30" y="154" width="130" height="44" rx="6" fill="#161b22" stroke="#E05D2A" stroke-width="1"/>
  <text x="95" y="172" text-anchor="middle" fill="#E05D2A" font-size="12" font-weight="700">stdin</text>
  <text x="95" y="188" text-anchor="middle" fill="#8b949e" font-size="10">pipe / terminal</text>

  <!-- Files -->
  <rect x="30" y="218" width="130" height="44" rx="6" fill="#161b22" stroke="#E05D2A" stroke-width="1"/>
  <text x="95" y="236" text-anchor="middle" fill="#E05D2A" font-size="12" font-weight="700">Log files</text>
  <text x="95" y="252" text-anchor="middle" fill="#8b949e" font-size="10">watch / tail</text>

  <!-- Flèches vers core -->
  <line x1="161" y1="112" x2="240" y2="180" stroke="#E05D2A" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="161" y1="176" x2="240" y2="188" stroke="#E05D2A" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>
  <line x1="161" y1="240" x2="240" y2="196" stroke="#E05D2A" stroke-width="1.5" marker-end="url(#arr)" opacity="0.7"/>

  <!-- Core Daemon -->
  <rect x="240" y="120" width="200" height="140" rx="8" fill="#1a0a00" stroke="#E05D2A" stroke-width="2"/>
  <text x="340" y="148" text-anchor="middle" fill="#E05D2A" font-size="13" font-weight="700">⚙  CamLog Daemon</text>
  <line x1="255" y1="158" x2="425" y2="158" stroke="#E05D2A" stroke-width="0.5" opacity="0.4"/>
  <text x="340" y="176" text-anchor="middle" fill="#c9d1d9" font-size="11">Parser &amp; structurer</text>
  <text x="340" y="196" text-anchor="middle" fill="#c9d1d9" font-size="11">Filtrage par niveau</text>
  <text x="340" y="216" text-anchor="middle" fill="#c9d1d9" font-size="11">Rotation &amp; archivage</text>
  <text x="340" y="236" text-anchor="middle" fill="#8b949e" font-size="10">async • tokio runtime</text>

  <!-- Flèches vers sorties -->
  <line x1="441" y1="170" x2="510" y2="140" stroke="#57ab5a" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>
  <line x1="441" y1="210" x2="510" y2="240" stroke="#57ab5a" stroke-width="1.5" marker-end="url(#arr)" opacity="0.8"/>

  <!-- Sorties (droite) -->
  <!-- Disk -->
  <rect x="510" y="100" width="140" height="60" rx="6" fill="#0a1f0a" stroke="#57ab5a" stroke-width="1"/>
  <text x="580" y="126" text-anchor="middle" fill="#57ab5a" font-size="12" font-weight="700">💾 Disk</text>
  <text x="580" y="144" text-anchor="middle" fill="#8b949e" font-size="10">.log / .gz archives</text>

  <!-- SQLite -->
  <rect x="510" y="200" width="140" height="60" rx="6" fill="#0a1520" stroke="#58a6ff" stroke-width="1"/>
  <text x="580" y="226" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="700">🗄  SQLite</text>
  <text x="580" y="244" text-anchor="middle" fill="#8b949e" font-size="10">structured queries</text>

  <!-- Badge Rust -->
  <rect x="270" y="296" width="140" height="28" rx="14" fill="#E05D2A" opacity="0.15" stroke="#E05D2A" stroke-width="1"/>
  <text x="340" y="314" text-anchor="middle" fill="#E05D2A" font-size="12" font-weight="700">🦀 Built in pure Rust</text>

  <!-- Code snippet déco -->
  <rect x="30" y="310" width="180" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="45" y="330" fill="#8b949e" font-size="10">// camlog/src/daemon.rs</text>
  <text x="45" y="348" fill="#79c0ff" font-size="10">async fn</text>
  <text x="103" y="348" fill="#c9d1d9" font-size="10"> run_daemon() {</text>
  <text x="55" y="364" fill="#E05D2A" font-size="10">listen_tcp</text>
  <text x="113" y="364" fill="#c9d1d9" font-size="10">(9000).await;</text>
  <text x="55" y="380" fill="#E05D2A" font-size="10">persist_sqlite</text>
  <text x="130" y="380" fill="#c9d1d9" font-size="10">(&amp;db);</text>
  <text x="45" y="396" fill="#c9d1d9" font-size="10">}</text>

  <!-- Snippet déco droite -->
  <rect x="470" y="310" width="180" height="80" rx="6" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="485" y="330" fill="#8b949e" font-size="10">// log entry struct</text>
  <text x="485" y="348" fill="#79c0ff" font-size="10">struct</text>
  <text x="519" y="348" fill="#E05D2A" font-size="10"> LogEntry</text>
  <text x="485" y="364" fill="#c9d1d9" font-size="10">  level: LogLevel,</text>
  <text x="485" y="380" fill="#c9d1d9" font-size="10">  message: String,</text>
  <text x="485" y="396" fill="#c9d1d9" font-size="10">  timestamp: u64,</text>
</svg>
