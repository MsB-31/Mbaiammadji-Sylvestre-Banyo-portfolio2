<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <title>Application de tracking réseau — Python Scapy</title>
  <rect width="680" height="420" fill="#0d1117" rx="10"/>

  <!-- Header -->
  <rect x="0" y="0" width="680" height="44" fill="#161b22" rx="10"/>
  <rect x="0" y="22" width="680" height="22" fill="#161b22"/>
  <circle cx="26" cy="22" r="9" fill="#238636"/>
  <text x="26" y="27" text-anchor="middle" fill="white" font-size="10" font-weight="700">NT</text>
  <text x="46" y="28" fill="white" font-size="13" font-weight="600">NetTracker — Cartographie réseau local</text>
  <rect x="560" y="8" width="108" height="26" rx="5" fill="#238636"/>
  <text x="614" y="25" text-anchor="middle" fill="white" font-size="11" font-weight="600">▶ Scanner réseau</text>

  <!-- Réseau central -->
  <!-- Routeur central -->
  <rect x="296" y="150" width="88" height="56" rx="8" fill="#1f6feb" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="340" y="174" text-anchor="middle" fill="white" font-size="11" font-weight="700">🌐 Routeur</text>
  <text x="340" y="190" text-anchor="middle" fill="#cae8ff" font-size="9">192.168.1.1</text>
  <text x="340" y="202" text-anchor="middle" fill="#cae8ff" font-size="9">Gateway</text>

  <!-- Appareil 1 — PC -->
  <rect x="80" y="80" width="100" height="52" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.2"/>
  <text x="130" y="101" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">💻 PC Bureau</text>
  <text x="130" y="115" text-anchor="middle" fill="#8b949e" font-size="9">192.168.1.10</text>
  <text x="130" y="127" text-anchor="middle" fill="#8b949e" font-size="9">A4:C3:F0:12:88:1B</text>
  <line x1="180" y1="112" x2="296" y2="172" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Appareil 2 — Laptop -->
  <rect x="80" y="200" width="100" height="52" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.2"/>
  <text x="130" y="221" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="700">💻 Laptop</text>
  <text x="130" y="235" text-anchor="middle" fill="#8b949e" font-size="9">192.168.1.12</text>
  <text x="130" y="247" text-anchor="middle" fill="#8b949e" font-size="9">B2:F1:C4:09:44:2A</text>
  <line x1="180" y1="226" x2="296" y2="190" stroke="#3fb950" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Appareil 3 — Smartphone -->
  <rect x="80" y="310" width="100" height="52" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="130" y="331" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700">📱 Smartphone</text>
  <text x="130" y="345" text-anchor="middle" fill="#8b949e" font-size="9">192.168.1.15</text>
  <text x="130" y="357" text-anchor="middle" fill="#8b949e" font-size="9">D9:44:AB:22:FF:01</text>
  <line x1="180" y1="336" x2="296" y2="198" stroke="#58a6ff" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Appareil 4 — Serveur -->
  <rect x="500" y="80" width="100" height="52" rx="6" fill="#161b22" stroke="#d29922" stroke-width="1.2"/>
  <text x="550" y="101" text-anchor="middle" fill="#d29922" font-size="11" font-weight="700">🖥 Serveur</text>
  <text x="550" y="115" text-anchor="middle" fill="#8b949e" font-size="9">192.168.1.20</text>
  <text x="550" y="127" text-anchor="middle" fill="#8b949e" font-size="9">C8:00:FF:A1:33:9D</text>
  <line x1="500" y1="112" x2="384" y2="172" stroke="#d29922" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Appareil 5 — Imprimante -->
  <rect x="500" y="200" width="100" height="52" rx="6" fill="#161b22" stroke="#f78166" stroke-width="1.2"/>
  <text x="550" y="218" text-anchor="middle" fill="#f78166" font-size="11" font-weight="700">🖨 Imprimante</text>
  <text x="550" y="232" text-anchor="middle" fill="#8b949e" font-size="9">192.168.1.25</text>
  <text x="550" y="248" text-anchor="middle" fill="#f78166" font-size="9">⚠ Anomalie</text>
  <line x1="500" y1="226" x2="384" y2="190" stroke="#f78166" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.8"/>

  <!-- Appareil 6 — IoT -->
  <rect x="500" y="310" width="100" height="52" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.2"/>
  <text x="550" y="331" text-anchor="middle" fill="#58a6ff" font-size="11" font-weight="700">📡 IoT Device</text>
  <text x="550" y="345" text-anchor="middle" fill="#8b949e" font-size="9">192.168.1.30</text>
  <text x="550" y="357" text-anchor="middle" fill="#8b949e" font-size="9">E1:77:BC:04:CD:55</text>
  <line x1="500" y1="336" x2="384" y2="198" stroke="#58a6ff" stroke-width="1.2" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- Tableau stats en bas -->
  <rect x="20" y="380" width="640" height="30" rx="6" fill="#161b22"/>
  <text x="36" y="399" fill="#8b949e" font-size="10">Appareils détectés :</text>
  <text x="160" y="399" fill="#3fb950" font-size="10" font-weight="700">6 actifs</text>
  <text x="230" y="399" fill="#8b949e" font-size="10">|</text>
  <text x="246" y="399" fill="#f78166" font-size="10">1 anomalie</text>
  <text x="340" y="399" fill="#8b949e" font-size="10">|  Stack :</text>
  <rect x="410" y="386" width="54" height="16" rx="8" fill="#1e3a2b" stroke="#3fb950" stroke-width="0.5"/>
  <text x="437" y="397" text-anchor="middle" fill="#3fb950" font-size="9">Python</text>
  <rect x="474" y="386" width="44" height="16" rx="8" fill="#1e2a3b" stroke="#58a6ff" stroke-width="0.5"/>
  <text x="496" y="397" text-anchor="middle" fill="#58a6ff" font-size="9">Scapy</text>
  <rect x="528" y="386" width="48" height="16" rx="8" fill="#2b1e3b" stroke="#a371f7" stroke-width="0.5"/>
  <text x="552" y="397" text-anchor="middle" fill="#a371f7" font-size="9">Socket</text>
  <rect x="586" y="386" width="52" height="16" rx="8" fill="#2b2b1e" stroke="#d29922" stroke-width="0.5"/>
  <text x="612" y="397" text-anchor="middle" fill="#d29922" font-size="9">SQLite</text>
</svg>
