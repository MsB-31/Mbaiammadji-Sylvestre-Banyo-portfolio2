<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <title>Dashboard Data Science — Analyse prédictive Python / Power BI</title>
  <desc>Dashboard d'analyse de données avec graphiques de prédictions, métriques ML et visualisations statistiques</desc>

  <!-- Fond -->
  <rect width="680" height="420" fill="#0e1117" rx="10"/>

  <!-- Header -->
  <rect x="0" y="0" width="680" height="44" fill="#161b22" rx="10"/>
  <rect x="0" y="22" width="680" height="22" fill="#161b22"/>
  <text x="22" y="27" fill="#6366f1" font-size="14" font-weight="700">◈</text>
  <text x="38" y="27" fill="white" font-size="13" font-weight="600">DataInsight Dashboard</text>
  <text x="440" y="27" fill="#94a3b8" font-size="11">Modèle : Random Forest v2.1</text>
  <rect x="590" y="8" width="78" height="24" rx="4" fill="#6366f1"/>
  <text x="629" y="24" text-anchor="middle" fill="white" font-size="10" font-weight="600">↻ Actualiser</text>

  <!-- Métriques top -->
  <!-- Card Accuracy -->
  <rect x="12" y="54" width="148" height="64" rx="7" fill="#161b22" stroke="#6366f1" stroke-width="0.5"/>
  <text x="86" y="74" text-anchor="middle" fill="#94a3b8" font-size="10">Précision modèle</text>
  <text x="86" y="98" text-anchor="middle" fill="#6366f1" font-size="24" font-weight="700">94.7%</text>
  <text x="86" y="112" text-anchor="middle" fill="#22c55e" font-size="10">▲ +1.2% vs v2.0</text>

  <!-- Card F1 -->
  <rect x="172" y="54" width="148" height="64" rx="7" fill="#161b22" stroke="#a855f7" stroke-width="0.5"/>
  <text x="246" y="74" text-anchor="middle" fill="#94a3b8" font-size="10">Score F1</text>
  <text x="246" y="98" text-anchor="middle" fill="#a855f7" font-size="24" font-weight="700">0.923</text>
  <text x="246" y="112" text-anchor="middle" fill="#22c55e" font-size="10">Macro-average</text>

  <!-- Card Samples -->
  <rect x="332" y="54" width="148" height="64" rx="7" fill="#161b22" stroke="#06b6d4" stroke-width="0.5"/>
